[mypy]
# Résolution des imports depuis src/
mypy_path = src
# Évite le conflit "found twice" quand src/ a un __init__.py
explicit_package_bases = True
# src/__main__.py est juste un point d'entrée, pas besoin de le vérifier
exclude = src/__main__.py

# Pandas-stubs gère pandas, pas besoin d'ignorer
# Les modules de l'ancienne architecture ou trop complexes à annoter
# sont exemptés via les sections ci-dessous

[mypy-Parsers.Adapters.*]
# Les adaptateurs suivent un patron répétitif avec pandas — ignorés
ignore_errors = True

[mypy-Analysis.homemade.*]
ignore_errors = True

[mypy-Analysis.pandas.*]
ignore_errors = True

[mypy-Common.*]
ignore_errors = True
